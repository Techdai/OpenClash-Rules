; ==========================================================
; --- 节点清洗：剔除机场展示/说明/防失联/流量提示节点 ---
; ==========================================================
exclude=建议|家宽|游戏|备用|测试|过期|自动|失败|错误|续费|超时|网络|登陆|更新|重新|如果|套餐|到期|剩余|流量|重置|官网|网站|网址|失联|公告|通知|TG|Telegram|电报|群|频道|说明|QQ|客服|工单|订阅|Expire|Traffic|Reset|Remaining|Official|Website


; ==========================================================
; 1) 规则集定义
; ==========================================================
; --- 私网直连（防回环，必须在最前）---
ruleset=DIRECT,[]GEOSITE,private
ruleset=DIRECT,[]GEOIP,private,no-resolve

; --- Aethersailor 直连补丁（修正误代理）---
ruleset=DIRECT,clash-domain:https://testingcf.jsdelivr.net/gh/Aethersailor/Custom_OpenClash_Rules@main/rule/Custom_Direct_Domain.yaml,28800
ruleset=DIRECT,clash-classic:https://testingcf.jsdelivr.net/gh/Aethersailor/Custom_OpenClash_Rules@main/rule/Custom_Direct_Classical_IP.yaml,28800

; --- 自定义直连（最高优先级，你的自定义规则）---
; ruleset=🎯 国内直连,https://raw.githubusercontent.com/Techdai/OpenClash-Rules/refs/heads/main/Custom.list
ruleset=🎯 国内直连,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/refs/heads/master/rule/Clash/Direct/Direct.list
 
; --- P2P / 下载直连 ---
ruleset=DIRECT,[]GEOSITE,category-game-platforms-download
ruleset=DIRECT,[]GEOSITE,category-public-tracker
ruleset=DIRECT,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/refs/heads/master/rule/Clash/Download/Download.list

; --- 国内直连 ---
ruleset=🎯 国内直连,[]GEOSITE,cn
ruleset=🎯 国内直连,[]GEOIP,cn,no-resolve
ruleset=DIRECT,[]GEOSITE,google-cn
ruleset=DIRECT,[]GEOSITE,category-games@cn

; --- AI & 必须走代理的 ---
ruleset=🤖 AI,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/refs/heads/master/Clash/Ruleset/AI.list

; --- 应用分流 ---
ruleset=👨🏻‍💻 GitHub,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/GitHub/GitHub.list
ruleset=🍎 Apple,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Apple/Apple.list
ruleset=🍀 Google,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Google/Google.list
ruleset=📲 Telegram,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Telegram/Telegram.list
ruleset=Ⓜ️ Microsoft,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Microsoft/Microsoft.list
ruleset=🎥 国外媒体,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/ProxyMedia.list
ruleset=🎵 TikTok,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/refs/heads/master/Clash/Ruleset/TikTok.list
ruleset=🎮 游戏,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/refs/heads/master/rule/Clash/Game/Game.list

; --- GFW 兜底代理 ---
ruleset=🚀 节点选择,[]GEOSITE,gfw
ruleset=🚀 节点选择,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/refs/heads/master/rule/Clash/Proxy/Proxy.list

; --- 最终兜底 ---
ruleset=🐟 漏网之鱼,[]FINAL


